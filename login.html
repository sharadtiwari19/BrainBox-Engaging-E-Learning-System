<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BrainBox Interactive Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }

        .hero-gradient {
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.1), transparent),
                        radial-gradient(circle at bottom left, rgba(168, 85, 247, 0.1), transparent);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .input-group:focus-within label {
            color: #6366f1;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-up {
            animation: slideUp 0.6s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col hero-gradient">

    <!-- Top Navigation -->
    <nav class="p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-2 group">
                <div class="bg-indigo-600 p-2 rounded-lg group-hover:scale-110 transition">
                    <i class="fas fa-brain text-white text-lg"></i>
                </div>
                <span class="text-xl font-800 tracking-tight text-slate-900">Brain<span class="text-indigo-600">Box</span></span>
            </a>
            <a href="index.html" class="text-slate-500 hover:text-slate-900 font-medium transition flex items-center gap-2">
                <i class="fas fa-arrow-left text-xs"></i> Back to Home
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-4 pb-12">
        <div class="w-full max-w-md animate-up">
            
            <div class="text-center mb-8">
                <h1 class="text-3xl font-800 text-slate-900 mb-2">Welcome Back!</h1>
                <p class="text-slate-500">Pick up right where you left off in your learning journey.</p>
            </div>

            <div class="glass-card p-8 md:p-10 rounded-[2.5rem] shadow-2xl shadow-indigo-100">
                
                <!-- Social Login -->
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <button class="flex items-center justify-center gap-3 border border-slate-200 py-3 rounded-xl hover:bg-slate-50 transition font-semibold text-slate-700">
                        <img src="https://www.svgrepo.com/show/355037/google.svg" class="w-5 h-5" alt="Google">
                        Google
                    </button>
                    <button class="flex items-center justify-center gap-3 border border-slate-200 py-3 rounded-xl hover:bg-slate-50 transition font-semibold text-slate-700">
                        <i class="fab fa-github text-xl"></i>
                        GitHub
                    </button>
                </div>

                <div class="relative flex items-center mb-8">
                    <div class="flex-grow border-t border-slate-200"></div>
                    <span class="flex-shrink mx-4 text-slate-400 text-sm font-medium uppercase tracking-widest">Or email</span>
                    <div class="flex-grow border-t border-slate-200"></div>
                </div>

                <!-- Form -->
                <form id="loginForm" class="space-y-6">
                    <div class="input-group">
                        <label for="email" class="block text-sm font-bold text-slate-700 mb-2 transition">Email Address</label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="email" id="email" required
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3.5 pl-11 pr-4 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition"
                                placeholder="name@company.com">
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="flex justify-between items-center mb-2">
                            <label for="password" class="block text-sm font-bold text-slate-700 transition">Password</label>
                            <a href="#" class="text-xs font-bold text-indigo-600 hover:text-indigo-700">Forgot Password?</a>
                        </div>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="password" id="password" required
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3.5 pl-11 pr-12 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition"
                                placeholder="••••••••">
                            <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                                <i id="passIcon" class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center">
                        <input type="checkbox" id="remember" class="w-4 h-4 text-indigo-600 border-slate-300 rounded focus:ring-indigo-500">
                        <label for="remember" class="ml-2 text-sm font-medium text-slate-600">Keep me signed in for 30 days</label>
                    </div>

                    <button type="submit" 
                        class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 transition shadow-lg shadow-indigo-200 flex items-center justify-center gap-2">
                        <span>Sign In</span>
                        <i class="fas fa-arrow-right text-sm"></i>
                    </button>
                </form>

                <p class="text-center mt-8 text-slate-600 font-medium">
                    New to BrainBox? <a href="register.html" class="text-indigo-600 font-bold hover:underline">Create an account</a>
                </p>
            </div>
            
            <!-- Quick Help -->
            <div class="mt-8 flex justify-center gap-6 text-sm text-slate-400 font-medium">
                <a href="#" class="hover:text-slate-600">Privacy Policy</a>
                <span>•</span>
                <a href="#" class="hover:text-slate-600">Terms of Service</a>
                <span>•</span>
                <a href="#" class="hover:text-slate-600">Contact Support</a>
            </div>
        </div>
    </main>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('passIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            // Mock Loading State
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch animate-spin"></i> Authenticating...';
            
            setTimeout(() => {
                // Mock success
                btn.classList.replace('bg-indigo-600', 'bg-emerald-500');
                btn.innerHTML = '<i class="fas fa-check"></i> Success! Redirecting...';
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            }, 1500);
        });
    </script>
</body>
</html>
